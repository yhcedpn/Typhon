# Correctness merge-gate task — runs the heavy PR checks on a WARM, REUSED c6id.8xlarge
# and writes a Markdown summary + raw test artifacts (.trx / logs) to S3 for the GitHub
# Actions runner to surface on the PR. Design: claude/design/Infrastructure/ci-merge-gate.md
#
# WARM-CLUSTER MODEL: the workflow runs `sky launch -c typhon-ci-gate -i <N>` (NOT `--down`).
# `-c <name>` reuses the cluster if it exists (or starts it if autostopped, or creates it if
# absent); setup: is idempotent so reuse is cheap; the per-PR compile is incremental in run:;
# `-i <N>` autostops the cluster after N idle minutes (STOP, not terminate → $0 compute, the
# EBS root persists). This trades the ephemeral model's $0-idle for ~$5/mo of always-on EBS
# (disk_size kept small on purpose) in exchange for skipping provision + toolchain install
# (~100 s) and a full build (~46 s → incremental) on every run. Rationale + cost model in the
# design doc. The c6id is VIRTUALIZED — correctness doesn't need bare-metal topology.
#
# Which suites run is driven by the RUN_* env flags the workflow passes (true/false).
name: typhon-ci-gate

resources:
  cloud: aws
  instance_type: c6id.8xlarge
  region: eu-west-1            # MUST match the typhon-traces S3 bucket region
  disk_size: 50               # EBS root (gp3). Small ON PURPOSE: a WARM/persistent cluster bills this
                              # 24/7 even while stopped — the 256 GB SkyPilot default would be ~$24/mo;
                              # 50 GB (ample for SDK + Node + repo + bin/obj + NuGet) is ~$4.6/mo.

workdir: .                     # the repo root — synced to ~/sky_workdir on the instance

file_mounts:
  /outputs:
    source: s3://typhon-traces
    mode: MOUNT                # writes to /outputs replicate to the bucket

envs:
  # Defaults are "false"/"local"; the workflow overrides them per run via --env.
  RUN_ENGINE: "false"
  RUN_WORKBENCH: "false"
  RUN_ID: "local"

# setup: runs ONCE per cluster creation (NOT on `sky exec`). On a WARM/persistent cluster everything
# here lands on the EBS root and survives stop/start, so each PR run skips it. The per-PR build lives
# in run: (incremental on a warm cluster). No /nvme mount — the engine tests write their DBs under
# /tmp (EBS root) already, so the instance-store NVMe was never on the test I/O path.
setup: |
  set -euo pipefail
  export DOTNET_ROOT="$HOME/.dotnet"
  export PATH="$DOTNET_ROOT:$DOTNET_ROOT/tools:$PATH"
  # IDEMPOTENT — `sky launch -c` re-runs setup on EVERY (re)use of the warm cluster, so each guard
  # skips work already on the persistent EBS root. On a warm cluster this is a few seconds; on first
  # creation it's the full install.
  [ -x "$DOTNET_ROOT/dotnet" ] || { curl -sSL https://dot.net/v1/dotnet-install.sh | bash -s -- --channel 10.0; }
  command -v node >/dev/null 2>&1 || { curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -; sudo apt-get install -y nodejs; }
  # Warm the NuGet cache (persists in ~/.nuget); incremental on reuse. The compile is in run: per PR.
  dotnet restore Typhon.slnx || true

# NOTE: do not use `set -e` here — we run several suites, capture each exit code, and want the
# script to continue so every suite's result and artifacts are collected before we exit RC.
run: |
  set -uo pipefail
  export DOTNET_ROOT="$HOME/.dotnet"
  export PATH="$DOTNET_ROOT:$DOTNET_ROOT/tools:$PATH"
  REPO=~/sky_workdir
  cd "$REPO"
  # Per-PR build (setup: no longer builds). On a WARM cluster `sky exec` syncs this PR's code over the
  # prior checkout, so this recompiles only what changed; on a cold/first run it's a full build.
  dotnet build Typhon.slnx -c Release
  # NOTE on parallelism: a single 16-worker `dotnet test` process is BOTH slow (the suite's 116
  # [NonParallelizable] fixtures pin it ~91% serial) AND flaky (parallel fixtures collide on the
  # engine's process-static state). The engine block below instead shards into K serial (workers=1)
  # PROCESSES via bench/aws/shard.py — see that file's header + the design doc for the rationale.
  OUT=~/ci-out                     # EBS root (no /nvme; tests already use /tmp). Cleared each run.
  rm -rf "$OUT"; mkdir -p "$OUT"
  RC=0
  S="$OUT/summary.md"
  { echo "# Typhon CI Gate — run ${RUN_ID}"; echo ""; } > "$S"

  # --- Engine: sharded suite MINUS the quarantined known-reds (Release, clean — the gate) ---
  # K parallel `dotnet test` processes (workers=1 each) on the 32-vCPU box. Writes shard{0..K-1}.trx
  # + shardS.trx (the serial Sensitive pass) + per-shard logs to $OUT; prints a summary table to
  # engine.log; exits non-zero if ANY shard fails. Coverage is gap-proof (shard 0 is a catch-all).
  if [ "$RUN_ENGINE" = "true" ]; then
    echo "## Engine tests" >> "$S"
    if SHARD_REPO="$REPO" SHARD_CONFIG=Release python3 bench/aws/shard.py run \
         --results-dir "$OUT" 2>&1 | tee "$OUT/engine.log"
    then echo "- ✅ engine suite passed (sharded: K×workers=1 + serial Sensitive pass)" >> "$S"
    else RC=1; echo "- ❌ engine suite FAILED (sharded)" >> "$S"
    fi
    echo "" >> "$S"
  fi

  # --- Workbench: TS toolchain + .NET tests (BLOCKING); Playwright e2e is deferred (P5) ---
  if [ "$RUN_WORKBENCH" = "true" ]; then
    echo "## Workbench" >> "$S"
    (
      cd "$REPO/tools/Typhon.Workbench/ClientApp"
      npm ci --no-audit --no-fund && \
      npm run generate-types && \
      npx tsc --noEmit && \
      npm run lint && \
      npx vitest run && \
      npm run build
    ) 2>&1 | tee "$OUT/workbench-client.log"
    if [ "${PIPESTATUS[0]}" -eq 0 ]; then echo "- ✅ client toolchain (typecheck/lint/vitest/build) passed" >> "$S"
    else RC=1; echo "- ❌ client toolchain FAILED" >> "$S"
    fi
    if dotnet test test/Typhon.Workbench.Tests/Typhon.Workbench.Tests.csproj \
         -c Release --no-build \
         --logger "trx;LogFileName=workbench.trx" --results-directory "$OUT" \
         2>&1 | tee "$OUT/workbench-dotnet.log"
    then echo "- ✅ workbench .NET tests passed" >> "$S"
    else RC=1; echo "- ❌ workbench .NET tests FAILED" >> "$S"
    fi
    # TODO(P5): Playwright e2e — non-blocking, report-only. Needs wb-dev servers (:5200/:5173) +
    # a headless browser provisioned on the VM. Deferred until the specs are proven stable.
    echo "" >> "$S"
  fi

  # Coverage is NOT part of the gate — it's opt-in (run-coverage label / dispatch → coverage.yml + coverage.sky.yaml).

  # Ship everything (summary + trx + logs) to the S3 mount for the runner to pull.
  DEST="/outputs/ci/${RUN_ID}"
  mkdir -p "$DEST"
  cp -r "$OUT/." "$DEST/" || true

  echo "CI gate finished with RC=$RC"
  exit $RC
