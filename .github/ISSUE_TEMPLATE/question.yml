name: Question
description: Ask how to do something with Typhon.
title: "[Question]: "
type: Question
body:
  - type: markdown
    attributes:
      value: "Checked [doc.typhondb.io](https://doc.typhondb.io)? If it's still unclear, ask away."
  - type: textarea
    id: goal
    attributes:
      label: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: What have you tried?
      description: Code, config, or docs you've already looked at.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Typhon version / commit
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Database
        - MVCC
        - Transactions
        - Indexes
        - Schema
        - Storage
        - Memory
        - Concurrency
        - Primitives
        - Observability
        - Execution
        - Errors
        - Workbench
        - Unsure
    validations:
      required: true
